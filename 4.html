<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Spiral Drop - Mockup</title>
<style>
  :root {
    --bg: #0b0f1a;
    --panel: rgba(15, 20, 35, 0.85);
    --accent: #4fd1ff;
    --accent2: #ff5c7a;
    --gold: #ffcf4d;
    --text: #eef2ff;
    --muted: #8b93b0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--bg);
    font-family: -apple-system, "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    overflow: hidden; color: var(--text);
  }
  #game-container { position: relative; width: 100%; height: 100vh; }
  canvas { display: block; touch-action: none; }

  .hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 16px; pointer-events: none; z-index: 10;
  }
  .hud-card {
    background: var(--panel); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 10px 16px; backdrop-filter: blur(6px);
  }
  .score-card { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
  .score-card span { color: var(--accent); }
  .gem-card { display: flex; align-items: center; gap: 6px; font-size: 16px; font-weight: 600; }
  .gem-dot { width: 14px; height: 14px; border-radius: 4px; background: var(--gold); box-shadow: 0 0 8px var(--gold); transform: rotate(45deg); }

  .combo-tag {
    position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
    font-size: 14px; font-weight: 700; color: var(--gold);
    background: var(--panel); padding: 5px 16px; border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    opacity: 0; transition: opacity 0.25s, transform 0.25s; z-index: 10; pointer-events: none;
  }
  .combo-tag.show { opacity: 1; transform: translateX(-50%) scale(1.08); }

  .controls-hint {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: var(--muted); background: var(--panel);
    padding: 7px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08);
    z-index: 10; pointer-events: none;
  }

  .overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(5,7,15,0.78); backdrop-filter: blur(4px);
    z-index: 20; flex-direction: column; gap: 18px; text-align: center; padding: 24px;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 30px; margin: 0; letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .overlay p { margin: 0; color: var(--muted); font-size: 14px; max-width: 320px; line-height: 1.6; }
  .big-stat { font-size: 46px; font-weight: 800; color: var(--text); }
  .big-stat small { display: block; font-size: 13px; color: var(--muted); font-weight: 500; margin-top: 4px; }

  .primary-btn {
    background: linear-gradient(135deg, var(--accent), #2b9cff);
    color: #06121f; border: none; padding: 14px 36px; border-radius: 30px;
    font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 24px rgba(79,209,255,0.35);
    transition: transform 0.12s;
  }
  .primary-btn:active { transform: scale(0.96); }

  .ranking-panel {
    background: var(--panel); border-radius: 16px; padding: 16px 20px;
    width: 280px; border: 1px solid rgba(255,255,255,0.08); text-align: left;
  }
  .ranking-panel h3 {
    margin: 0 0 10px 0; font-size: 13px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between;
  }
  .rank-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .rank-row:last-child { border-bottom: none; }
  .rank-num {
    width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.08); color: var(--muted);
  }
  .rank-row.me .rank-num { background: var(--accent); color: #06121f; }
  .rank-row.me { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>
<div id="game-container">
  <div class="hud">
    <div class="hud-card score-card">DEPTH <span id="score-val">0</span></div>
    <div class="hud-card gem-card"><div class="gem-dot"></div><span id="gem-val">0</span></div>
  </div>
  <div class="combo-tag" id="combo-tag">COMBO x<span id="combo-val">2</span></div>
  <div class="controls-hint">좌우로 드래그해서 타워를 돌려 빈틈을 맞추세요</div>

  <div class="overlay" id="start-overlay">
    <h1>SPIRAL DROP</h1>
    <p>공이 나선형 타워를 따라 끝없이 떨어집니다.<br>타워를 돌려 빨간 구간을 피하고 빈틈으로 통과하세요.</p>
    <button class="primary-btn" id="start-btn">게임 시작</button>
    <div class="ranking-panel">
      <h3>이번 주 랭킹 <span>WEEKLY</span></h3>
      <div class="rank-row"><div style="display:flex;align-items:center;gap:8px"><div class="rank-num">1</div>김도윤</div><div>318층</div></div>
      <div class="rank-row"><div style="display:flex;align-items:center;gap:8px"><div class="rank-num">2</div>이서연</div><div>276층</div></div>
      <div class="rank-row"><div style="display:flex;align-items:center;gap:8px"><div class="rank-num">3</div>박민재</div><div>241층</div></div>
      <div class="rank-row me"><div style="display:flex;align-items:center;gap:8px"><div class="rank-num">9</div>나 (L)</div><div id="my-best">0층</div></div>
    </div>
  </div>

  <div class="overlay hidden" id="gameover-overlay">
    <h1>BROKEN THROUGH</h1>
    <div class="big-stat" id="final-score">0층<small>이번 판 기록</small></div>
    <p id="result-msg">빨간 가시 구간에 부딪혔습니다.</p>
    <button class="primary-btn" id="retry-btn">다시 떨어지기</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // ---------- CONFIG ----------
  const SEGMENTS = 8;
  const LEVEL_GAP = 1.7;
  const TOWER_RADIUS = 2.1;
  const PLATFORM_THICK = 0.22;
  const BALL_RADIUS = 0.26;
  const GRAVITY = -0.0145;
  const BOUNCE_VELOCITY = 0.27;

  let levels = [];
  let levelIndex = 0;
  let dragLastX = null;
  let running = false;
  let score = 0;
  let gems = 0;
  let combo = 0;
  let myBest = 0;
  let ballVelY = 0;
  let ballY = 0;
  let gemMeshes = [];
  let ballSquash = 1;

  // ---------- THREE SETUP ----------
  const container = document.getElementById('game-container');
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x0b0f1a, 6, 22);

  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 8.5);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  container.insertBefore(renderer.domElement, container.firstChild);

  // sky gradient dome
  const skyGeo = new THREE.SphereGeometry(60, 20, 14);
  const topC = new THREE.Color(0x161c34); const botC = new THREE.Color(0x3a2350);
  const sp = skyGeo.attributes.position; const cols = [];
  for (let i = 0; i < sp.count; i++) {
    const t = THREE.MathUtils.clamp((sp.getY(i) / 60 + 0.3), 0, 1);
    const c = botC.clone().lerp(topC, t);
    cols.push(c.r, c.g, c.b);
  }
  skyGeo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
  const sky = new THREE.Mesh(skyGeo, new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.BackSide, fog: false }));
  scene.add(sky);

  const ambient = new THREE.AmbientLight(0x6677aa, 0.6);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0x9fd8ff, 1.2);
  dirLight.position.set(4, 6, 8);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(1024, 1024);
  scene.add(dirLight);
  const rimLight = new THREE.DirectionalLight(0xff5c7a, 0.4);
  rimLight.position.set(-5, -3, -6);
  scene.add(rimLight);

  // ---------- TOWER GROUP (rotates as a whole) ----------
  const towerGroup = new THREE.Group();
  scene.add(towerGroup);

  const poleGeo = new THREE.CylinderGeometry(0.12, 0.12, 400, 10);
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x232a40, roughness: 0.6, metalness: 0.3 });
  const pole = new THREE.Mesh(poleGeo, poleMat);
  pole.position.y = -195;
  towerGroup.add(pole);

  // ---------- BALL (cute mascot, simplified) ----------
  const ball = new THREE.Group();
  scene.add(ball);
  const ballBody = new THREE.Mesh(
    new THREE.SphereGeometry(BALL_RADIUS, 24, 24),
    new THREE.MeshPhysicalMaterial({ color: 0x4fd1ff, emissive: 0x0d4f66, emissiveIntensity: 0.3, roughness: 0.3, metalness: 0.1, clearcoat: 0.5 })
  );
  ballBody.castShadow = true;
  ball.add(ballBody);
  function makeEye(x) {
    const g = new THREE.Group();
    g.add(new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), new THREE.MeshStandardMaterial({ color: 0xffffff })));
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.034, 10, 10), new THREE.MeshBasicMaterial({ color: 0x1a1a2e }));
    pupil.position.set(0, 0, 0.04);
    g.add(pupil);
    g.position.set(x, 0.04, 0.23);
    return g;
  }
  ball.add(makeEye(-0.09), makeEye(0.09));
  const blushGeo = new THREE.SphereGeometry(0.045, 10, 10); blushGeo.scale(1, 0.6, 0.4);
  function makeBlush(x) {
    const b = new THREE.Mesh(blushGeo, new THREE.MeshBasicMaterial({ color: 0xff9eb5, transparent: true, opacity: 0.5 }));
    b.position.set(x, -0.03, 0.21);
    return b;
  }
  ball.add(makeBlush(-0.16), makeBlush(0.16));
  const ballGlow = new THREE.Mesh(new THREE.SphereGeometry(BALL_RADIUS * 1.6, 16, 16), new THREE.MeshBasicMaterial({ color: 0x4fd1ff, transparent: true, opacity: 0.1 }));
  ball.add(ballGlow);

  // ---------- LEVEL GENERATION ----------
  function segColor(type) {
    if (type === 'danger') return { color: 0x2a2a33, accent: 0xff2d3d };
    return { color: 0x355a78, accent: 0x4fd1ff };
  }

  function buildLevel(index) {
    const y = -index * LEVEL_GAP - LEVEL_GAP;
    const group = new THREE.Group();
    group.position.y = y;
    towerGroup.add(group);

    const difficulty = Math.min(index * 0.06, 3.2);
    const dangerChance = Math.min(0.1 + difficulty * 0.06, 0.42);
    const gapChance = 0.32;

    const segAngle = (Math.PI * 2) / SEGMENTS;
    const segMeshes = [];
    const guaranteedGap = Math.floor(Math.random() * SEGMENTS); // 항상 최소 1개 빈틈 보장

    for (let s = 0; s < SEGMENTS; s++) {
      let type;
      if (s === guaranteedGap) type = 'gap';
      else {
        const r = Math.random();
        type = r < gapChance ? 'gap' : (r < gapChance + dangerChance ? 'danger' : 'normal');
      }

      const angleStart = s * segAngle;
      if (type !== 'gap') {
        const geo = new THREE.CylinderGeometry(TOWER_RADIUS, TOWER_RADIUS, PLATFORM_THICK, 10, 1, false, angleStart, segAngle * 0.92);
        const c = segColor(type);
        const mat = new THREE.MeshStandardMaterial({ color: c.color, roughness: 0.5, metalness: 0.3, flatShading: true });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.castShadow = true; mesh.receiveShadow = true;
        group.add(mesh);

        const stripeGeo = new THREE.CylinderGeometry(TOWER_RADIUS + 0.01, TOWER_RADIUS + 0.01, 0.05, 10, 1, false, angleStart, segAngle * 0.92);
        const stripeMat = new THREE.MeshBasicMaterial({ color: c.accent });
        const stripe = new THREE.Mesh(stripeGeo, stripeMat);
        stripe.position.y = PLATFORM_THICK / 2 + 0.026;
        group.add(stripe);

        segMeshes.push({ mesh, type, angleStart, angleEnd: angleStart + segAngle * 0.92 });
      } else {
        segMeshes.push({ mesh: null, type: 'gap', angleStart, angleEnd: angleStart + segAngle });
      }
    }

    // 보너스 젬: 빈틈 위쪽에 떠 있는 코인 (확률)
    if (Math.random() > 0.5) {
      const gapSegs = segMeshes.filter(s => s.type === 'gap');
      if (gapSegs.length) {
        const g = gapSegs[Math.floor(Math.random() * gapSegs.length)];
        const midAngle = (g.angleStart + g.angleEnd) / 2;
        const gem = new THREE.Mesh(
          new THREE.OctahedronGeometry(0.16, 0),
          new THREE.MeshPhysicalMaterial({ color: 0xffcf4d, emissive: 0x6a4a00, emissiveIntensity: 0.6, metalness: 0.8, roughness: 0.15, clearcoat: 0.6 })
        );
        gem.position.set(Math.cos(midAngle) * TOWER_RADIUS * 0.55, LEVEL_GAP * 0.45, Math.sin(midAngle) * TOWER_RADIUS * 0.55);
        gem.userData = { angle: midAngle, levelY: y, collected: false };
        group.add(gem);
        gemMeshes.push(gem);
      }
    }

    return { group, segMeshes, y, index };
  }

  function ensureLevels(upToIndex) {
    while (levels.length <= upToIndex) {
      levels.push(buildLevel(levels.length));
    }
  }

  function clearTower() {
    levels.forEach(l => towerGroup.remove(l.group));
    levels = [];
    gemMeshes = [];
  }

  // ---------- INPUT (drag to rotate tower) ----------
  function onPointerDown(x) { dragLastX = x; }
  function onPointerMove(x) {
    if (dragLastX === null) return;
    const dx = x - dragLastX;
    towerGroup.rotation.y += dx * 0.012;
    dragLastX = x;
  }
  function onPointerUp() { dragLastX = null; }

  renderer.domElement.addEventListener('mousedown', e => onPointerDown(e.clientX));
  window.addEventListener('mousemove', e => onPointerMove(e.clientX));
  window.addEventListener('mouseup', onPointerUp);
  renderer.domElement.addEventListener('touchstart', e => onPointerDown(e.touches[0].clientX));
  renderer.domElement.addEventListener('touchmove', e => { onPointerMove(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
  renderer.domElement.addEventListener('touchend', onPointerUp);
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') towerGroup.rotation.y -= 0.12;
    if (e.key === 'ArrowRight') towerGroup.rotation.y += 0.12;
  });

  // ---------- HUD ----------
  function updateHUD() {
    document.getElementById('score-val').textContent = score;
    document.getElementById('gem-val').textContent = gems;
  }
  let comboTimer = null;
  function flashCombo() {
    if (combo < 2) return;
    const tag = document.getElementById('combo-tag');
    document.getElementById('combo-val').textContent = combo;
    tag.classList.add('show');
    clearTimeout(comboTimer);
    comboTimer = setTimeout(() => tag.classList.remove('show'), 700);
  }

  // ---------- GAME STATE ----------
  function resetGame() {
    clearTower();
    levelIndex = 0;
    score = 0; gems = 0; combo = 0;
    ballVelY = 0;
    ballY = -LEVEL_GAP * 0.45;
    towerGroup.rotation.y = Math.random() * Math.PI * 2;
    ensureLevels(14);
    updateHUD();
  }

  function angleOfBallRelativeToTower() {
    let a = -towerGroup.rotation.y;
    a = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    return a;
  }

  function checkLevelCollision(level) {
    const ang = angleOfBallRelativeToTower();
    for (const seg of level.segMeshes) {
      if (ang >= seg.angleStart && ang < seg.angleEnd) return seg;
    }
    return level.segMeshes[0];
  }

  function endGame(msg) {
    running = false;
    if (score > myBest) {
      myBest = score;
      document.getElementById('my-best').textContent = myBest + '층';
    }
    document.getElementById('final-score').innerHTML = score + '층<small>젬 ' + gems + '개 획득</small>';
    document.getElementById('result-msg').textContent = msg;
    document.getElementById('gameover-overlay').classList.remove('hidden');
  }

  function startGame() {
    document.getElementById('start-overlay').classList.add('hidden');
    document.getElementById('gameover-overlay').classList.add('hidden');
    resetGame();
    running = true;
  }

  function shatterEffect() {
    const ox = camera.position.x;
    let n = 0;
    const shake = setInterval(() => {
      camera.position.x = ox + (Math.random() - 0.5) * 0.15;
      n++;
      if (n > 8) { clearInterval(shake); camera.position.x = ox; }
    }, 30);
  }

  // ---------- ANIMATE ----------
  function animate() {
    requestAnimationFrame(animate);

    if (running) {
      ballVelY += GRAVITY;
      ballY += ballVelY;

      const currentLevel = levels[levelIndex];
      if (currentLevel) {
        const platformTopY = currentLevel.y + PLATFORM_THICK / 2;
        if (ballVelY < 0 && ballY - BALL_RADIUS <= platformTopY) {
          const seg = checkLevelCollision(currentLevel);
          if (seg.type === 'danger') {
            shatterEffect();
            endGame('빨간 가시 구간에 부딪혔습니다.');
            ballVelY = 0;
          } else if (seg.type === 'normal') {
            ballY = platformTopY + BALL_RADIUS;
            ballVelY = BOUNCE_VELOCITY;
            ballSquash = 0.6;
            combo = 0;
            score = levelIndex + 1;
            levelIndex++;
            ensureLevels(levelIndex + 12);
            updateHUD();
          } else {
            combo++;
            score = levelIndex + 1;
            levelIndex++;
            flashCombo();
            ensureLevels(levelIndex + 12);
            updateHUD();
          }
        }
      }

      // 젬 수집 — 같은 층을 통과하는 순간 근접 판정
      gemMeshes.forEach(g => {
        if (g.userData.collected) return;
        if (Math.abs(g.userData.levelY - (ballY - LEVEL_GAP * 0.45)) < 0.6 && Math.abs(g.userData.levelY - ballY) < 0.5) {
          const ang = angleOfBallRelativeToTower();
          let diff = Math.abs(ang - g.userData.angle);
          if (diff > Math.PI) diff = Math.PI * 2 - diff;
          if (diff < 0.45) {
            g.userData.collected = true;
            g.visible = false;
            gems++;
            updateHUD();
          }
        }
        g.rotation.y += 0.04;
      });

      ballSquash += (1 - ballSquash) * 0.18;
      ballBody.scale.set(1 / Math.sqrt(ballSquash), ballSquash, 1 / Math.sqrt(ballSquash));

      camera.position.y = ballY + 0.9;
      sky.position.y = ballY;

      ball.position.y = ballY;
      camera.lookAt(0, ballY - 1.2, 0);
    } else {
      ball.rotation.y += 0.01;
    }

    renderer.render(scene, camera);
  }

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('retry-btn').addEventListener('click', startGame);
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // initial idle preview
  ensureLevels(8);
  ballY = -LEVEL_GAP * 0.45;
  ball.position.y = ballY;
  camera.position.y = ballY + 0.9;
  camera.lookAt(0, ballY - 1.2, 0);

  animate();
})();
</script>
</body>
</html>
